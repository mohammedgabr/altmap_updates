id: langtrace-panel

info:
  name: Langtrace Panel - Detect
  author: rxerium
  severity: info
  description: |
    Langtrace, an open-source, OpenTelemetry-based observability platform for LLM applications that provides tracing, monitoring, and analytics for LLM, vector database, and framework calls, was detected. An exposed, self-hosted Langtrace dashboard instance was identified, which typically redirected unauthenticated requests to a login page.
  reference:
    - https://github.com/Scale3-Labs/langtrace
    - https://langtrace.ai
  metadata:
    verified: true
    max-request: 1
    vendor: scale3labs
    product: langtrace
    shodan-query: 'http.title:"Langtrace"'
  tags: panel,langtrace,llm,ai,observability,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "<title>Langtrace</title>"
          - "Open source observability for your LLM applications"
        condition: and

      - type: status
        status:
          - 200
