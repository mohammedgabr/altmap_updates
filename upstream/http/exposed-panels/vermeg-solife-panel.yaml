id: vermeg-solife-panel

info:
  name: Vermeg Solife Panel - Detect
  author: righettod
  severity: info
  description: |
     Vermeg Solife was detected - A life insurance solution with cash, tax, legal, and claims management to boost operational efficiency and ensure compliance.
  reference:
    - https://www.vermeg.com/solutions/solife/
  metadata:
    verified: true
    max-request: 2
    shodan-query: http.title:"vermeg"
  tags: panel,vermeg,login,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}/solife/"
      - "{{BaseURL}}/WebInterface/login.html"

    stop-at-first-match: true
    matchers:
      - type: dsl
        dsl:
          - 'status_code == 200'
          - 'contains_any(to_lower(body), "<title>vermeg files", "<title>vermeg life")'
        condition: and

    extractors:
      - type: regex
        part: body
        group: 1
        regex:
          - '\.js\?v=([0-9A-Za-z_\-.]+)'
