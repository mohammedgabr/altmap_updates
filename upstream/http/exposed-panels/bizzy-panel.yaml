id: bizzy-panel

info:
  name: BIZZY Login - Panel
  author: Kazgangap
  severity: info
  description: |
    BIZZY login Panel was detected. BIZZY is a vulnerability management platform.
  classification:
    cwe-id: CWE-200
  metadata:
    verified: true
    max-request: 1
  tags: panel,bizzy,login,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers:
      - type: dsl
        dsl:
          - 'contains(to_lower(body), "login - bizzy")'
          - 'status_code == 200'
        condition: and
