name: Update Nuclei Tags Index

on:
  schedule:
    - cron: "0 0 * * *"   # daily at midnight
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clone nuclei-templates (Upstream)
        run: |
          # Clone depth 1 to save time/space
          git clone --depth 1 https://github.com/projectdiscovery/nuclei-templates.git upstream_temp
          mkdir -p upstream
          # Remove existing http directory to allow overwrite
          rm -rf upstream/http
          # Move only the http directory as requested
          mv upstream_temp/http upstream/
          rm -rf upstream_temp

      - name: Ensure directories and CSVs exist
        run: |
          mkdir -p altmap_verified/changed
          mkdir -p altmap_failed
          touch altmap_verified/.gitkeep
          touch altmap_failed/.gitkeep
          touch verified.csv
          touch unverified.csv
          touch changed_after_verified.csv
          touch failed.csv

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Generate index
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          cd generator
          go mod tidy
          go run main.go

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add cves.json cves.json-checksum.txt unverified.csv changed_after_verified.csv failed.csv tags-index.json upstream/ altmap_verified/ altmap_failed/
          git diff --cached --quiet || git commit -m "Automated update of template indexes and tracking files"

      - name: Push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push origin main

      - name: Purge jsDelivr Cache
        run: |
          curl -s https://purge.jsdelivr.net/gh/mohammedgabr/altmap_updates@main/cves.json-checksum.txt
          curl -s https://purge.jsdelivr.net/gh/mohammedgabr/altmap_updates@main/cves.json
