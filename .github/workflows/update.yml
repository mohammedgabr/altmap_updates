name: Update Nuclei Tags Index

on:
  schedule:
    - cron: "0 0 * * *"   # daily at midnight
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clone nuclei-templates (Upstream)
        run: |
          # Clone depth 1 to save time/space
          git clone --depth 1 https://github.com/projectdiscovery/nuclei-templates.git upstream_temp
          mkdir -p upstream
          # Move only the http directory as requested
          mv upstream_temp/http upstream/
          rm -rf upstream_temp

      - name: Ensure directories and CSVs exist
        run: |
          mkdir -p altmap_verified/changed
          touch altmap_verified/.gitkeep
          touch verified.csv
          touch unverified.csv
          touch changed_after_verified.csv

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Generate index
        run: |
          cd generator
          go mod tidy
          go run main.go

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add cves.json cves.json-checksum.txt unverified.csv changed_after_verified.csv tags-index.json upstream/ altmap_verified/
          git diff --cached --quiet || git commit -m "Automated update of template indexes and tracking files"

      - name: Push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push origin main
